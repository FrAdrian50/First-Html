<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Me</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
        }

        header{
            background-color: #2b3a4a;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
        }

        header h1{
            color: white;
        }

        nav{
            margin-top: 10px;
        }

        nav a{
            color: #90caf9;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover{
            color: white;
        }

        main{
            padding: 40px;
        }

        h2{
            color: white;
            margin-bottom: 15px;
        }

        form{
            margin-top: 20px;
        }

        input, textarea{
            width: 100%;
            max-width: 400px;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #1f1f1f;
            color: white;
        }

        input[type="submit"]{
            background-color: #90caf9;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="submit"]:hover{
            background-color: white;
        }

        footer{
            background-color: #2b3a4a;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            border-top: 1px solid #444;
            color: #d0d0d0;
        }

    </style>

</head>
<body>

    <header>

        <h1>Contact Me</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <main>

        <h2>Send a Message</h2>

        <form>

            <label>Name:</label><br>
            <input type="text"><br>

            <label>Email:</label><br>
            <input type="email"><br>

            <label>Message:</label><br>
            <textarea rows="5"></textarea><br>

            <input type="submit" value="Send">

        </form>

    </main>

    <footer>

        <p>© 2026 Franz Adrian M. Riel | Contact Page</p>

    </footer>

</body>
</html>
